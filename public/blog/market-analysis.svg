<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1A4D3A"/>
  <rect x="0" y="0" width="800" height="400" fill="url(#grid)" opacity="0.07"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Bar chart icon -->
  <rect x="290" y="180" width="30" height="80" rx="4" fill="#C9A84C" opacity="0.9"/>
  <rect x="335" y="140" width="30" height="120" rx="4" fill="#C9A84C" opacity="0.7"/>
  <rect x="380" y="110" width="30" height="150" rx="4" fill="#C9A84C" opacity="0.9"/>
  <rect x="425" y="155" width="30" height="105" rx="4" fill="#C9A84C" opacity="0.7"/>
  <rect x="470" y="120" width="30" height="140" rx="4" fill="#C9A84C" opacity="0.9"/>
  <!-- Trend line -->
  <polyline points="305,220 350,185 395,155 440,170 485,135" fill="none" stroke="#DEC06A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots on line -->
  <circle cx="305" cy="220" r="5" fill="#DEC06A"/>
  <circle cx="350" cy="185" r="5" fill="#DEC06A"/>
  <circle cx="395" cy="155" r="5" fill="#DEC06A"/>
  <circle cx="440" cy="170" r="5" fill="#DEC06A"/>
  <circle cx="485" cy="135" r="5" fill="#DEC06A"/>
  <!-- Label -->
  <text x="400" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#C9A84C" opacity="0.8">Пазарен Анализ</text>
  <text x="400" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#C9A84C" opacity="0.5">New Key Properties</text>
</svg>
