      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Simplified city grid blocks -->
  <rect x="200" y="160" width="60" height="50" rx="4" fill="#C9A84C" opacity="0.25" stroke="#C9A84C" stroke-width="2"/>
  <rect x="270" y="140" width="80" height="70" rx="4" fill="#C9A84C" opacity="0.35" stroke="#C9A84C" stroke-width="2"/>
  <rect x="360" y="130" width="90" height="80" rx="4" fill="#C9A84C" opacity="0.55" stroke="#C9A84C" stroke-width="2"/>
  <rect x="460" y="145" width="70" height="65" rx="4" fill="#C9A84C" opacity="0.4" stroke="#C9A84C" stroke-width="2"/>
  <rect x="540" y="160" width="60" height="50" rx="4" fill="#C9A84C" opacity="0.3" stroke="#C9A84C" stroke-width="2"/>
  <rect x="240" y="220" width="70" height="55" rx="4" fill="#C9A84C" opacity="0.3" stroke="#C9A84C" stroke-width="2"/>
  <rect x="320" y="220" width="160" height="60" rx="4" fill="#C9A84C" opacity="0.45" stroke="#C9A84C" stroke-width="2"/>
  <rect x="490" y="220" width="80" height="55" rx="4" fill="#C9A84C" opacity="0.3" stroke="#C9A84C" stroke-width="2"/>
