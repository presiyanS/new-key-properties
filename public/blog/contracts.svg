<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1A4D3A"/>
  <rect x="0" y="0" width="800" height="400" fill="url(#grid6)" opacity="0.07"/>
  <defs>
    <pattern id="grid6" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Contract document -->
  <rect x="280" y="90" width="180" height="240" rx="10" fill="none" stroke="#C9A84C" stroke-width="4" opacity="0.85"/>
  <!-- Lines of text -->
  <line x1="305" y1="135" x2="435" y2="135" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="305" y1="155" x2="435" y2="155" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="305" y1="175" x2="410" y2="175" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="305" y1="205" x2="435" y2="205" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="305" y1="225" x2="420" y2="225" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="305" y1="245" x2="435" y2="245" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Signature line -->
  <line x1="305" y1="295" x2="420" y2="295" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Pen signing -->
  <line x1="430" y1="200" x2="510" y2="120" stroke="#DEC06A" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <polygon points="425,210 435,195 445,205" fill="#DEC06A" opacity="0.85"/>
  <line x1="505" y1="115" x2="520" y2="105" stroke="#DEC06A" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- Label -->
  <text x="400" y="368" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#C9A84C" opacity="0.5">New Key Properties</text>
</svg>
